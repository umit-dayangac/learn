<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    
    <!-- Sırasız Listler -->
     <ul style="list-style-type: circle;">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
        <li>item 4
            <ul>
                <li>4.1</li>
                <li>4.2</li>
                <li>4.3</li>
            </ul>
        </li>
     </ul>

     <!-- Sıralı Listeler -->
    <ol>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
    </ol>
    
    <!-- description dl -->
     <dl>
        <dt>HTML</dt>
        <dd>HTML Nedir</dd>
        <dd>HTML Ne İşe Yarar</dd>
        <dt>CSS</dt>
        <dd>CSS Nedir</dd>
        <dd>CSS Ne İşe Yarar</dd>
     </dl>

</body>
</html>
