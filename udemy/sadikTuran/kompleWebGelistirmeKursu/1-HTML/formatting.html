<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting</title>
</head>
<body>
    
    <!-- html biçimlendirme etiketleri -->
    <p>
        <b>Lorem ipsum dolor</b> sit, amet <strong>consectetur</strong> adipisicing elit. Ratione, ex!
    </p>
    <p>
        <i>Lorem</i> ipsum dolor sit <em>amet consectetur</em> adipisicing elit. Deleniti, soluta.
    </p>

    <!-- html biçimlendirme etiketleri -->
    <h1>
        Lorem, ipsum dolor.
        <small>Lorem, ipsum.</small>
    </h1>

    <p>
        Lorem ipsum <mark>dolor sit</mark> amet consectetur, adipisicing elit. Ducimus, architecto.
    </p>
    <p>
        H<sub>2</sub>O
    </p>
    <p>
        X<sup>2</sup>
    </p>

</body>
</html>
